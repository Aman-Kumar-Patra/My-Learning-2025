<!DOCTYPE html>
<html lang="en">

<head>

    <title>Inmportant CSS keyword</title>
    <style>
        p {
            background-color: black;
            color: white !important;
            /* text-align: center !important; */
            text-align: right;
        }
        p {
            color: yellow;
        }
        div {
            width: 100px;
            height: 100px;
            background-color: gray;            
        }
        div {
            background-color: green !important;
        }
        div {
            background-color: yellow;
        }
        div {
            background-color: black;
        }
    </style>
</head>

<body>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Reprehenderit quas repellat, doloremque reiciendis natus a.        
    </p>
    <div></div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <title>CSS Selectors Types</title>
    <style>
        * {
            color: red;
        }
        h1 {
            background-color: whitesmoke;
            /* color: green; */
            text-align: center;
            border: 5px solid green;
        }

        h2 {
            background-color: whitesmoke;
            /* color: orangered; */
            text-align: center;
            border: 5px solid orangered;
        }

        #wizard {
            background-color: whitesmoke;
            /* color: orange; */
            text-align: right;
            border: 5px solid orange;
        }
        .header {
            background-color: whitesmoke;
            /* color: blueviolet; */
            text-align: center;
            border: 5px solid blueviolet;
        }
        h1, h2, h3, div, #para {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- Element
         ID
         Class
         Universal
         Group
         -->
    <h1>CodeWizardAman inside h1</h1>
    <h2>CodeWizardAman inside h2</h2>
    <h3 id="wizard">CodeWizardAman inside h3</h3>
    <div class="header">CodeWizardAman inside div</div>
    <p id="para">CodeWizardAman inside paragraph</p>
</body>

</html>

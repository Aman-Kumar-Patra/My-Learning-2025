<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>DIV and SPAN Element</title>
    <style>
        div {
            width: 400px;
            height: 100px;
            background-color: gray;
            }
        span {
            
            background-color: green;
        }
    </style>
</head>
<body>
    <div>
        <h1>CodeWizardAman Website</h1>
    </div>
    <div>
        <h1><span>Hi</span>CodeWizardAman Website</h1>
       
    </div>
    <span>How are you</span>
    <span>How are you</span>
    <span>How are you</span>
</body>
</html>

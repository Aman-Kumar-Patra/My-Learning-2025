<!DOCTYPE html>
<html lang="en">
<head>

    <title>Attribute of Input Element</title>
</head>
<body>
        <form action="">
            User Name: <input type="username" name="username" placeholder="Write user name" width="40px" height="100px" required/>
            First Name: <input type="text" value="Aman" name="first_name" id="firstname" readonly> <br>
            Middle Name: <input type="text" name="Middle_name" value="Aman" id="middlename" size="100" > <br>
            Last Name: <input type="text" name="Last_name" value="" id="lastname" size="100" disabled> <br>
            City Name: <input type="text" name="City_name" value="" id="cityname" size="100" autofocus/> <br>
            Address: <input type="text" name="address_name" value="" id="addressname" size="100" maxlength="1" /> <br>
            Number: <input type="number" name="address_nam" value="" id="addressname" min="9" max="20" step="3"> <br>
            file: <input type="image" src="" name="addressh_name" value="" id="addressname multiple/"><br>
            Image: <input type="image" src="image/pngwing.com (35).png" width="150px" height="100px"/><br>
            <input type="submit" /><br>
            
        </form>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio and Checkbox</title>
</head>
<body>
    <form action="">
        <h1>Heading</h1>
        Male: <input type="radio" name="gender" value="Male"/>
        Female: <input type="radio" name="gender" value="Female"/>
        Other: <input type="radio" name="gender" value="Other"/>
        
        <h1>Checkbox</h1>
        I am student:<input type="checkbox" name="std_info" value="I am student"/>
        I am disabled:<input type="checkbox" name="std_info" value="I am disabled"/>
        I am Poor:<input type="checkbox" name="std_info" value="I am Poor"/>


    </form>
</body>
</html>
